services:
  # ── Frontend (Vite dev server) ────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev
    command: npm run dev
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules         # don't override node_modules with host
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - api
    networks:
      - pdf_net

  # ── Express API server ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: dev
    command: npm run server
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - ./auto_ingest_pdfs:/app/auto_ingest_pdfs
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - STANDALONE_API=true
      - SERVER_PORT=3002
    networks:
      - pdf_net

  # ── Python embedder (run on demand, not always-on) ───────────────────────────
  embedder:
    build:
      context: .
      target: dev
    command: python embed-local.py
    volumes:
      - .:/app
      - /app/node_modules
      - embedder_cache:/root/.cache   # cache sentence-transformer model downloads
    env_file:
      - .env
    networks:
      - pdf_net
    profiles:
      - embed    # only starts with: docker compose --profile embed up

  # ── ChromaDB (local vector store) ────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - pdf_net

volumes:
  chroma_data:
  embedder_cache:

networks:
  pdf_net:
    driver: bridge
